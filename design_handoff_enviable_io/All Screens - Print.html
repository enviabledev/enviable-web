<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Enviable I&O — Complete System · Print Edition</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  :root {
    --page-w: 1400px;
    --page-h: 950px;
  }
  body { margin: 0; background: #d6d8de; font-family: var(--font-sans); color: var(--ink); }

  /* On-screen helper bar (hidden on print) */
  .helper-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 200; background: var(--navy-800); color: #fff; padding: 9px 16px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .helper-bar .brand-mark { width: 22px; height: 22px; border-radius: 4px; background: linear-gradient(135deg, #2c5e8e, #5a82a8); display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 10px; }
  .helper-bar .title { font-size: 13px; font-weight: 600; }
  .helper-bar .sub { font-size: 10.5px; color: #8aa6c4; margin-left: auto; }
  .helper-bar .print-btn { background: var(--navy-700); border: 1px solid var(--navy-600); color: #fff; height: 28px; padding: 0 14px; border-radius: 3px; font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .helper-bar .print-btn:hover { background: var(--navy-600); }
  .helper-bar .print-btn[disabled] { opacity: 0.6; cursor: wait; }
  .helper-bar .status { font-size: 11px; color: #8aa6c4; font-variant-numeric: tabular-nums; }

  .stage { padding: 60px 30px 60px; }

  /* Cover page */
  .cover-page {
    width: var(--page-w);
    height: var(--page-h);
    margin: 0 auto 24px;
    background: #fff;
    box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    padding: 80px 80px 60px;
    display: flex; flex-direction: column;
    position: relative;
    page-break-after: always;
  }
  .cover-mark {
    width: 64px; height: 64px; border-radius: 8px;
    background: linear-gradient(135deg, #2c5e8e, #1F4E79);
    color: #fff; display: grid; place-items: center;
    font-size: 24px; font-weight: 700; letter-spacing: 0.06em;
    margin-bottom: 40px;
  }
  .cover-title { font-size: 48px; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; line-height: 1.05; margin-bottom: 14px; }
  .cover-sub { font-size: 18px; color: var(--grey-700); font-weight: 400; line-height: 1.5; max-width: 720px; margin-bottom: 60px; }
  .cover-meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; max-width: 820px; padding-top: 30px; border-top: 2px solid var(--navy-700); }
  .cover-meta-grid .k { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--grey-500); font-weight: 700; margin-bottom: 4px; }
  .cover-meta-grid .v { font-size: 14px; color: var(--ink); font-weight: 500; line-height: 1.5; }
  .cover-foot { margin-top: auto; display: flex; align-items: flex-end; justify-content: space-between; padding-top: 30px; border-top: 1px solid var(--grey-200); font-size: 12px; color: var(--grey-500); }
  .cover-foot .confidential { color: var(--amber-700); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }

  /* TOC page */
  .toc-page {
    width: var(--page-w);
    height: var(--page-h);
    margin: 0 auto 24px;
    background: #fff;
    box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    padding: 50px 70px;
    display: flex; flex-direction: column;
    page-break-after: always;
  }
  .toc-title { font-size: 32px; font-weight: 700; margin: 0 0 30px; letter-spacing: -0.02em; padding-bottom: 14px; border-bottom: 2px solid var(--navy-700); }
  .toc-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 30px 50px; }
  .toc-section h3 { margin: 0 0 8px; font-size: 11px; color: var(--navy-700); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; padding-bottom: 4px; border-bottom: 1px solid var(--grey-200); }
  .toc-section a { display: grid; grid-template-columns: 28px 1fr auto; gap: 12px; padding: 5px 0; align-items: baseline; font-size: 12.5px; color: var(--ink); text-decoration: none; border-bottom: 1px dotted var(--grey-200); }
  .toc-section a:hover { color: var(--navy-700); }
  .toc-section .num { font-family: var(--font-mono); color: var(--grey-500); font-size: 11px; }
  .toc-section .label { font-weight: 500; }
  .toc-section .page { font-family: var(--font-mono); color: var(--grey-500); font-size: 11px; }

  /* Section divider — full bleed colored page */
  .section-divider {
    width: var(--page-w);
    height: var(--page-h);
    margin: 0 auto 24px;
    background: linear-gradient(135deg, var(--navy-800) 0%, var(--navy-700) 100%);
    color: #fff;
    box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    padding: 80px 100px;
    display: flex; flex-direction: column; justify-content: center;
    position: relative;
    page-break-before: always;
    page-break-after: always;
  }
  .section-divider .sd-num { font-family: var(--font-mono); font-size: 16px; color: rgba(255,255,255,0.6); font-weight: 600; margin-bottom: 18px; letter-spacing: 0.08em; }
  .section-divider .sd-title { font-size: 58px; font-weight: 700; line-height: 1.05; letter-spacing: -0.02em; margin-bottom: 18px; }
  .section-divider .sd-desc { font-size: 18px; color: rgba(255,255,255,0.78); max-width: 700px; line-height: 1.55; margin-bottom: 40px; }
  .section-divider .sd-count {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    background: rgba(255,255,255,0.12);
    border-radius: 4px;
    font-size: 13px; font-weight: 500;
    align-self: flex-start;
    font-variant-numeric: tabular-nums;
  }
  .section-divider .sd-screens-list { margin-top: 30px; display: flex; flex-direction: column; gap: 6px; font-size: 13px; color: rgba(255,255,255,0.85); max-width: 700px; }
  .section-divider .sd-screens-list .row { display: grid; grid-template-columns: 36px 1fr; gap: 16px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .section-divider .sd-screens-list .num { font-family: var(--font-mono); color: rgba(255,255,255,0.5); }

  /* Screen page */
  .screen-page {
    width: var(--page-w);
    height: var(--page-h);
    margin: 0 auto 24px;
    background: #fff;
    box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    display: flex; flex-direction: column;
    page-break-before: always;
    page-break-after: always;
    overflow: hidden;
  }
  .screen-page .sp-header {
    flex-shrink: 0;
    padding: 14px 22px;
    border-bottom: 2px solid var(--navy-700);
    background: linear-gradient(180deg, #fff 0%, #F5F7FA 100%);
    display: flex; align-items: center; gap: 16px;
  }
  .screen-page .sp-num {
    font-family: var(--font-mono);
    font-size: 12px;
    background: var(--navy-700); color: #fff;
    padding: 5px 11px; border-radius: 3px;
    font-weight: 700; letter-spacing: 0.04em;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .screen-page .sp-title {
    flex: 1; min-width: 0;
  }
  .screen-page .sp-title h2 {
    margin: 0;
    font-size: 19px; font-weight: 600; color: var(--ink);
    letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 10px;
  }
  .screen-page .sp-title .role-pill {
    font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
    padding: 2px 8px; border-radius: 3px;
    text-transform: uppercase;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .role-pill.warehouse  { background: #E6F0EB; color: #1F5A37; }
  .role-pill.procurement{ background: var(--amber-50); color: var(--amber-700); }
  .role-pill.sales      { background: #F4E8F1; color: #8E4A7C; }
  .role-pill.executive  { background: var(--navy-700); color: #fff; }
  .role-pill.it         { background: var(--grey-100); color: var(--grey-700); border: 1px solid var(--grey-300); }
  .role-pill.auditor    { background: var(--red-50); color: var(--red-700); }
  .role-pill.shared     { background: var(--navy-100); color: var(--navy-800); }
  .screen-page .sp-title .meta { font-size: 12px; color: var(--grey-500); margin-top: 3px; }
  .screen-page .sp-section-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--grey-500); font-weight: 700;
    text-align: right; line-height: 1.4;
  }
  .screen-page .sp-section-label .name { color: var(--navy-700); }
  .screen-page .sp-section-label .page-no { font-family: var(--font-mono); color: var(--grey-700); }

  .screen-page .sp-frame-wrap {
    flex: 1;
    overflow: hidden;
    background: #fff;
    position: relative;
  }
  .screen-page iframe {
    border: none;
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Print: each screen page becomes one landscape sheet */
  @media print {
    @page { size: A3 landscape; margin: 0; }
    body { background: #fff !important; }
    .helper-bar { display: none !important; }
    .stage { padding: 0 !important; }
    .cover-page, .toc-page, .section-divider, .screen-page {
      width: 100% !important;
      height: 100vh !important;
      margin: 0 !important;
      box-shadow: none !important;
      page-break-after: always;
    }
    .cover-page:last-child, .screen-page:last-child { page-break-after: auto; }
    .section-divider { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<div class="helper-bar">
  <div class="brand-mark">EI</div>
  <div class="title">Enviable I&amp;O · Complete System Print Edition</div>
  <div class="sub">Use <b style="color:#fff">Ctrl/⌘ P</b> to save as PDF · A3 landscape recommended · 25 sheets</div>
  <span class="status" id="loadStatus">loading 0 / 27 screens…</span>
  <button class="print-btn" id="printBtn" disabled>
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 9.5h10v3a.5.5 0 01-.5.5h-9a.5.5 0 01-.5-.5v-3z"/><path d="M5 9.5V3h6v6.5M5 5h6"/></svg>
    Save as PDF
  </button>
</div>

<div class="stage" id="stage"></div>

<script>
  /* ====== MANIFEST ====== */
  const GROUPS = [
    { id: 1, name: 'Foundation', description: 'The design language, the application shell, and the building blocks every screen reuses.', screens: [
      { num: '01', file: 'Design System.html',           title: 'Design System',                  role: 'shared',     subtitle: 'Buttons · inputs · pills · tables · modals · toasts · empty states' },
      { num: '02', file: 'App Shell.html',               title: 'Application Shell',              role: 'shared',     subtitle: 'Topbar, collapsible sidebar, empty content area, notifications popover' }
    ]},
    { id: 2, name: 'Dashboards · per role', description: 'Role-scoped first-screen-of-the-day for each user persona — what they see when they sign in.', screens: [
      { num: '03', file: 'Dashboard.html',               title: 'Dashboard — Warehouse Manager',  role: 'warehouse',  subtitle: 'Kelechi Ekuru · stock snapshot, active shipments, variant bar chart' },
      { num: '04', file: 'Dashboard - Procurement.html', title: 'Dashboard — Procurement Officer',role: 'procurement',subtitle: 'Funmi Adebayo · POs by status, recent PIs, supplier groups' },
      { num: '05', file: 'Dashboard - Sales.html',       title: 'Dashboard — Sales Officer',      role: 'sales',      subtitle: 'Chioma Nwankwo · stock available for sale (CKD + CBU), no cost data' },
      { num: '06', file: 'Dashboard - Executive.html',   title: 'Dashboard — Executive',          role: 'executive',  subtitle: 'Adaeze Okeke · MD/ED/GM read-only oversight, recent activity feed' }
    ]},
    { id: 3, name: 'Procurement', description: 'Raising and approving Purchase Orders, reviewing Proforma Invoices, and receiving inbound shipments.', screens: [
      { num: '07', file: 'Create Purchase Order.html',   title: 'Create Purchase Order',          role: 'procurement',subtitle: 'PO-2026-002 · supplier, line items, totals, attachments' },
      { num: '08', file: 'Purchase Order Detail.html',   title: 'Purchase Order Detail',          role: 'procurement',subtitle: 'PO-2026-001 · 4-stage ApprovalLadder · stage 3 pending' },
      { num: '09', file: 'Review Proforma Invoice.html', title: 'Review Proforma Invoice',        role: 'procurement',subtitle: 'PI ORD0000023649 Rev 1 · tabbed line items / diff / source PDF' },
      { num: '10', file: 'Receive Shipment.html',        title: 'Receive Shipment',               role: 'warehouse',  subtitle: 'SHP-2026-002 · manifest match, serialisation, landed cost, docs' }
    ]},
    { id: 4, name: 'Inventory', description: 'Tracking every physical unit and the assembly jobs that convert CKD kits into sellable CBUs.', screens: [
      { num: '11', file: 'Units Listing.html',           title: 'Units (Kekes) Listing',          role: 'warehouse',  subtitle: '2,070 individually-tracked units · filters + row actions' },
      { num: '12', file: 'Unit Detail.html',             title: 'Unit Detail',                    role: 'warehouse',  subtitle: 'TVSKGS25E0001234 · summary + movement-history timeline' },
      { num: '13', file: 'New Assembly Job.html',        title: 'New Assembly Job',               role: 'warehouse',  subtitle: 'AJ-2026-0119 · scan/bulk-add CKD units, 4-step workflow guide' }
    ]},
    { id: 5, name: 'Sales', description: 'From customer onboarding through order taking, payment recording, and dispatch documentation.', screens: [
      { num: '14', file: 'New Customer.html',            title: 'New Customer',                   role: 'sales',      subtitle: 'Reseller customer form · pricing tier with live price preview' },
      { num: '15', file: 'New Sales Order.html',         title: 'New Sales Order',                role: 'sales',      subtitle: 'SO-2026-001 · per-unit allocation, totals, 9-state lifecycle' },
      { num: '16', file: 'Record Payment Modal.html',    title: 'Record Payment Modal',           role: 'sales',      subtitle: 'Bank transfer · manual confirmation · success toast' },
      { num: '17', file: 'SO Documents Review.html',     title: 'Sales Order Documents',          role: 'sales',      subtitle: 'Invoice + Release Authorisation + Delivery Note + lifecycle sidebar' }
    ]},
    { id: 6, name: 'Reports', description: 'Operational read-only views: stock valuation as-of, and the immutable audit log.', screens: [
      { num: '18', file: 'Stocks Report.html',           title: 'Stocks Report',                  role: 'executive',  subtitle: 'As-of inventory with state breakdown · spare parts · charts' },
      { num: '19', file: 'Audit Log.html',               title: 'Audit Log',                      role: 'auditor',    subtitle: 'Immutable log · property diffs · blocked-mutation forensic record' }
    ]},
    { id: 7, name: 'Admin', description: 'User and role management, plus the initial historical data import wizard.', screens: [
      { num: '20', file: 'Users v2.html',                title: 'Users · List',                   role: 'it',         subtitle: '12 accounts · reports-to relationships · status segmented filter' },
      { num: '21', file: 'User Detail.html',             title: 'User Detail',                    role: 'it',         subtitle: 'Kelechi Ekuru · Profile / Roles / Activity tabs' },
      { num: '22', file: 'Historical Data Load.html',    title: 'Historical Data Load',           role: 'it',         subtitle: '5-step import wizard · Step 2 (Upload Kekes) active' }
    ]},
    { id: 8, name: 'Responsive variants', description: 'Tablet (1024px) and mobile (390px) variants for the three highest-priority MVP screens.', screens: [
      { num: '23', file: 'Dashboard — Tablet.html',          title: 'Dashboard · Tablet (1024)',      role: 'warehouse', subtitle: 'Icon-rail sidebar, 4-col KPIs, 2-col content' },
      { num: '24', file: 'Dashboard — Mobile.html',          title: 'Dashboard · Mobile (390)',       role: 'warehouse', subtitle: 'Hamburger drawer, KPI stack, card-list shipments' },
      { num: '25', file: 'New Sales Order — Tablet.html',    title: 'New Sales Order · Tablet (1024)',role: 'sales',     subtitle: 'Icon sidebar, dense form, lines + totals 2-col' },
      { num: '26', file: 'New Sales Order — Mobile.html',    title: 'New Sales Order · Mobile (390)', role: 'sales',     subtitle: 'Line items as cards, lifecycle scroll, sticky submit' },
      { num: '27', file: 'Unit Detail — Tablet.html',        title: 'Unit Detail · Tablet (1024)',    role: 'warehouse', subtitle: 'Hero with avatar, 2-col KV, dense timeline' },
      { num: '28', file: 'Unit Detail — Mobile.html',        title: 'Unit Detail · Mobile (390)',     role: 'warehouse', subtitle: 'Hero + tabs, KV stacks, vertical timeline' }
    ]}
  ];

  /* Flatten total */
  let totalScreens = 0;
  GROUPS.forEach(g => totalScreens += g.screens.length);

  /* Page number — every render block is 1 sheet
     1 = cover, 2 = TOC, then for each group: 1 section divider + N screens */
  function computePageNumbers() {
    let p = 1; // cover
    p++;       // TOC = 2
    GROUPS.forEach(g => {
      p++;     // section divider
      g.screens.forEach(s => { s.pageNo = ++p; });
    });
  }
  computePageNumbers();

  /* ====== RENDER ====== */
  const stage = document.getElementById('stage');

  // 1. Cover page
  const cover = document.createElement('div');
  cover.className = 'cover-page';
  cover.innerHTML = `
    <div class="cover-mark">EI</div>
    <div class="cover-title">Enviable Inventory<br/>&amp; Operations</div>
    <div class="cover-sub">Complete system design · ${totalScreens} screens across procurement, warehouse, sales, reporting and administration · including tablet and mobile variants for the highest-priority MVP flows.</div>
    <div class="cover-meta-grid">
      <div><div class="k">Prepared for</div><div class="v">Enviable Tricycle Auto Parts Ltd.<br/>Plot 14B, Apapa-Oshodi Expressway, Lagos</div></div>
      <div><div class="k">Version</div><div class="v">MVP design pack · v1<br/>19 May 2026</div></div>
      <div><div class="k">Scope</div><div class="v">Inventory, procurement, sales, finance, admin · phase 1</div></div>
    </div>
    <div class="cover-foot">
      <span>${totalScreens} screens · 8 sections · A3 landscape print format</span>
      <span class="confidential">Confidential · for internal review only</span>
    </div>
  `;
  stage.appendChild(cover);

  // 2. TOC page
  const toc = document.createElement('div');
  toc.className = 'toc-page';
  let tocHtml = '<h1 class="toc-title">Contents</h1><div class="toc-cols">';
  GROUPS.forEach(g => {
    tocHtml += `<div class="toc-section"><h3>${g.id}. ${g.name}</h3>`;
    g.screens.forEach(s => {
      tocHtml += `<a href="#sc-${s.num}"><span class="num">${s.num}</span><span class="label">${s.title}</span><span class="page">p. ${s.pageNo}</span></a>`;
    });
    tocHtml += '</div>';
  });
  tocHtml += '</div>';
  toc.innerHTML = tocHtml;
  stage.appendChild(toc);

  // 3. Each group: divider + screens
  GROUPS.forEach(g => {
    // Section divider
    const div = document.createElement('div');
    div.className = 'section-divider';
    let listHtml = '<div class="sd-screens-list">';
    g.screens.forEach(s => {
      listHtml += `<div class="row"><span class="num">${s.num}</span><span>${s.title}</span></div>`;
    });
    listHtml += '</div>';
    div.innerHTML = `
      <div class="sd-num">Section ${g.id} of ${GROUPS.length}</div>
      <div class="sd-title">${g.name}</div>
      <div class="sd-desc">${g.description}</div>
      <div class="sd-count">${g.screens.length} screen${g.screens.length===1?'':'s'} in this section</div>
      ${listHtml}
    `;
    stage.appendChild(div);

    // Screens
    g.screens.forEach(s => {
      const page = document.createElement('div');
      page.className = 'screen-page';
      page.id = 'sc-' + s.num;
      page.innerHTML = `
        <div class="sp-header">
          <span class="sp-num">${s.num}</span>
          <div class="sp-title">
            <h2>${s.title} <span class="role-pill ${s.role}">${s.role}</span></h2>
            <div class="meta">${s.subtitle}</div>
          </div>
          <div class="sp-section-label">
            <div class="name">${g.id}. ${g.name}</div>
            <div class="page-no">Page ${s.pageNo}</div>
          </div>
        </div>
        <div class="sp-frame-wrap">
          <iframe data-file="${s.file}" loading="lazy"></iframe>
        </div>
      `;
      stage.appendChild(page);
    });
  });

  /* ====== LOADING ====== */
  const allFrames = document.querySelectorAll('iframe');
  const status = document.getElementById('loadStatus');
  const printBtn = document.getElementById('printBtn');
  let loaded = 0;
  function updateStatus() {
    status.textContent = `loading ${loaded} / ${allFrames.length} screens…`;
    if (loaded >= allFrames.length) {
      status.textContent = `✓ ${allFrames.length} screens ready · Save as PDF`;
      printBtn.disabled = false;
    }
  }
  updateStatus();
  allFrames.forEach(f => {
    f.addEventListener('load', () => {
      loaded++; updateStatus();
      try {
        const doc = f.contentDocument;
        if (!doc) return;
        const s = doc.createElement('style');
        s.textContent = '#role-switcher,#system-state-switcher,#day-one-banner{display:none!important;}';
        doc.head.appendChild(s);
      } catch (e) {}
    });
    f.src = f.dataset.file;
  });

  printBtn.addEventListener('click', () => window.print());
</script>

</body>
</html>
